name: Keep Supabase Alive

on:
  schedule:
    # Runs every Monday at 8am UTC — adjust if needed
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          echo "Pinging Supabase project..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/games?select=id&limit=1")
          echo "Response status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "406" ]; then
            echo "✅ Supabase is alive and responding."
          else
            echo "⚠️ Unexpected status code: $STATUS"
          fi
